<!DOCTYPE html>
<html lang="en">
    <head>
		<title>MAP SM XProtoV.3.35</title><base href="" target="_blank">
        <link rel="stylesheet" href="css/bootstrap.min.css">
        <link rel="stylesheet" href="css/main.css">
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">        
        <meta name="robots" content="noindex, nofollow"> 
        <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌐</text></svg>">
        <link rel="stylesheet" href="/css/xterm.css" />
    </head>
    <body>
        
        <div id="terminal" style="width:600px; height:500px; border: solid blue 1px;"></div>
        <script type="module">
            import xtmod from '/web_modules/xterm.js'
            var term = new xtmod.Terminal();
            term.open(document.getElementById('terminal'));
            term.setOption('theme', { foreground: '#00FF44' });
            function runMochTerminal() {
				if( term._initialized ){
					return;
				}
				term._initialized = true;
				term.prompt = () => {
					term.write('\r\n$> ');
				};
				term.writeln('Starting... \x1B[1;3;31mxterm.js\x1B[0m ')
				term.writeln('[a]    [a]    [a]    [a]    [a]    [a]');
				term.writeln('');
				prompt(term);
				term.onData(e =>{
                    switch (e) {
					    case '\r': // Enter
					    case '\u0003': // Ctrl+C
                            prompt(term);
                            break;
					    case '\u007F': // Backspace (DEL)
                            // Do not delete the prompt
                            if (term._core.buffer.x > 2) {
                                term.write('\b \b');
                            }
                            break;
					    default: // Print all other characters for demo
                            term.write(e);
                    }
				});
            }
            function prompt(term) {
                term.write('\r\n$ ');
            }
            runMochTerminal();

        </script>


      
	</body>
</html>
